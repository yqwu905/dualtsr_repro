# Colab-friendly E-MMDiT pretraining entry.
#
# This uses the same DualTSR objectives and E-MMDiT implementation as the full
# paper-scale configs, but reduces model width/batch size so a single Colab GPU
# can start training and save resumable checkpoints.

output_dir: outputs/colab_emmdit_synth

runtime:
  device: cuda
  precision: bf16
  seed: 1234

synth: &synth
  font_dir: assets/fonts
  output_dir: data/synth_colab
  num_samples: 20000
  format: lmdb
  image_format: jpeg
  jpeg_quality: 92
  seed: 1234
  workers: 2
  charset_min_fonts: 6
  corpus_path: null
  bg_image_dir: null

data:
  type: synth_render
  scale: 4
  hr_size: [128, 512]
  max_text_length: 24
  text_sequence_length: 25
  synth: *synth
  degradation:
    strategies:
      - name: bsrgan_random_order
        probability: 0.5
        random_order: true
        blur_prob: 0.8
        blur_min: 0.1
        blur_max: 2.0
        noise_prob: 0.6
        noise_min: 0.0
        noise_max: 8.0
        jpeg_prob: 0.7
        jpeg_min: 35
        jpeg_max: 95
      - name: realesrgan_ordered
        probability: 0.5
        random_order: false
        blur_prob: 0.9
        blur_min: 0.1
        blur_max: 2.5
        noise_prob: 0.7
        noise_min: 0.0
        noise_max: 10.0
        jpeg_prob: 0.8
        jpeg_min: 30
        jpeg_max: 95
  train:
    type: synth_render
    length: 100000
  val:
    type: synth_render
    length: 128

tokenizer:
  class_path: dualtsr.tokenizer:CharTokenizer
  vocab_path: data/synth_colab/vocab.txt
  pad_token: <pad>
  mask_token: <mask>
  unk_token: <unk>
  eos_token: <eos>

vae:
  type: autoencoder_dc
  pretrained_path: weights/dc-ae-f32c32-sana-1.0-diffusers
  latent_channels: 32
  latent_size: [4, 16]
  scaling_factor: 0.41407

model:
  hidden_dim: 384
  text_encoder:
    type: char
  mmdit:
    class_path: dualtsr.emmdit:EMMDiTBackbone
    init_args:
      patch_size: 1
      num_heads: 12
      group_depths: [2, 6, 2]
      mlp_ratio: 3.0
      dropout: 0.0
      use_subregion_attention: true
      gradient_checkpointing: true

loader:
  batch_size: 1
  num_workers: 2
  pin_memory: true
  drop_last: true
  persistent_workers: true

optimizer:
  lr: 0.0001
  weight_decay: 0.05
  betas: [0.9, 0.95]

train:
  max_steps: 10000
  global_batch_size: 8
  warmup_steps: 500
  min_lr_ratio: 0.0
  text_timesteps: 4
  text_delta: 0.0001
  text_loss_weight_by_time: true
  guidance_scale: 1.0
  cfg_dropout: 0.1
  ema_decay: 0.9999
  grad_clip_norm: 1.0
  loss_img_weight: 1.0
  loss_txt_weight: 1.0
  loss_joint_weight: 1.0
  resume: null

checkpoint:
  save_every: 500

logging:
  scalar_every: 10
  image_every: 500
  max_images: 2

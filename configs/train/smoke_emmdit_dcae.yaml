output_dir: outputs/smoke_emmdit_dcae

runtime:
  device: cpu
  precision: fp32
  seed: 11

data:
  type: synthetic
  scale: 2
  # DC-AE compresses this to a 4x4 latent, the smallest grid accepted by
  # E-MMDiT's 2x/4x multi-path compressor.
  hr_size: [128, 128]
  max_text_length: 7
  text_sequence_length: 8
  train:
    type: synthetic
    length: 1
  val:
    type: synthetic
    length: 1
  degradation:
    random_order: false
    blur_prob: 0.0
    noise_prob: 0.0
    jpeg_prob: 0.0

tokenizer:
  class_path: dualtsr.tokenizer:CharTokenizer
  alphabet: ["A", "B", "C", "1", "2", "中", "文", "复", "现"]

vae:
  type: autoencoder_dc
  pretrained_path: weights/dc-ae-f32c32-sana-1.0-diffusers
  latent_channels: 32
  latent_size: [4, 4]
  scaling_factor: 0.41407

model:
  hidden_dim: 32
  mmdit:
    class_path: dualtsr.emmdit:EMMDiTBackbone
    init_args:
      patch_size: 1
      num_heads: 4
      group_depths: [1, 1, 1]
      mlp_ratio: 2.0
      use_subregion_attention: true
      gradient_checkpointing: true

loader:
  batch_size: 1
  num_workers: 0
  drop_last: true

optimizer:
  lr: 0.0001
  weight_decay: 0.05
  betas: [0.9, 0.95]

train:
  max_steps: 1
  global_batch_size: 1
  warmup_steps: 0
  text_timesteps: 2
  text_delta: 0.0001
  text_loss_weight_by_time: true
  guidance_scale: 1.0
  cfg_dropout: 0.1
  ema_decay: 0.99
  grad_clip_norm: 1.0

checkpoint:
  save_every: 1

logging:
  scalar_every: 1
  image_every: 1
  max_images: 1

infer:
  checkpoint: outputs/smoke_emmdit_dcae/checkpoints/latest.pt
  input_dir: outputs/smoke_inputs
  output_dir: outputs/smoke_emmdit_dcae_infer
  steps: 2
  cfg_scale: 1.0
  text_sampling: argmax
  use_ema: true

output_dir: outputs/dualtsr_ctr_4x

runtime:
  device: auto
  precision: bf16
  seed: 1234
  ddp_find_unused_parameters: true

prepare:
  source_lmdb: /path/to/ctr/scene/train_lmdb
  output_dir: data/ctr_tsr
  vocab_path: data/ctr_tsr/vocab.txt
  export_images: false

data:
  type: ctr_lmdb
  scale: 4
  hr_size: [128, 512]
  max_text_length: 24
  text_sequence_length: 25
  min_long_side: 64
  min_aspect_ratio: 2.0
  scan_images: true
  degradation:
    # The paper samples one of two blind degradation strategies with p=0.5.
    strategies:
      - name: bsrgan_random_order
        probability: 0.5
        random_order: true
        blur_prob: 0.8
        blur_min: 0.1
        blur_max: 2.0
        noise_prob: 0.6
        noise_min: 0.0
        noise_max: 8.0
        jpeg_prob: 0.7
        jpeg_min: 35
        jpeg_max: 95
      - name: realesrgan_ordered
        probability: 0.5
        random_order: false
        blur_prob: 0.9
        blur_min: 0.1
        blur_max: 2.5
        noise_prob: 0.7
        noise_min: 0.0
        noise_max: 10.0
        jpeg_prob: 0.8
        jpeg_min: 30
        jpeg_max: 95
  train:
    type: ctr_lmdb
    lmdb_path: /path/to/ctr/scene/train_lmdb
    online_degradation: true
  val:
    type: ctr_lmdb
    lmdb_path: /path/to/ctr/scene/test_lmdb
    online_degradation: true
    deterministic_degradation: true
    degradation_seed: 1234

tokenizer:
  class_path: dualtsr.tokenizer:CharTokenizer   # 切换词级: dualtsr.tokenizer:WordTokenizer
  vocab_path: data/ctr_tsr/vocab.txt
  pad_token: <pad>
  mask_token: <mask>
  unk_token: <unk>
  eos_token: <eos>

vae:
  # Public 32x-compression VAE used by AMD Nitro-E.
  type: autoencoder_dc
  pretrained_path: weights/dc-ae-f32c32-sana-1.0-diffusers
  latent_channels: 32
  latent_size: [4, 16]
  scaling_factor: 0.41407

model:
  hidden_dim: 768
  text_encoder:
    type: char
  mmdit:
    class_path: dualtsr.emmdit:EMMDiTBackbone
    init_args:
      patch_size: 1
      num_heads: 24
      group_depths: [4, 16, 4]
      mlp_ratio: 3.0
      dropout: 0.0
      use_subregion_attention: true
      gradient_checkpointing: true

loader:
  batch_size: 8
  num_workers: 8
  pin_memory: true
  drop_last: true
  persistent_workers: true

optimizer:
  lr: 0.0001
  weight_decay: 0.05
  betas: [0.9, 0.95]

train:
  max_steps: 700000
  global_batch_size: 32
  warmup_steps: 10000
  min_lr_ratio: 0.0
  text_timesteps: 8
  text_delta: 0.0001
  text_loss_weight_by_time: true
  guidance_scale: 1.0
  cfg_dropout: 0.1
  ema_decay: 0.9999
  grad_clip_norm: 1.0
  loss_img_weight: 1.0
  loss_txt_weight: 1.0
  loss_joint_weight: 1.0
  resume: null

checkpoint:
  save_every: 5000

logging:
  scalar_every: 10
  image_every: 1000
  max_images: 4

infer:
  checkpoint: outputs/dualtsr_ctr_4x/checkpoints/latest.pt
  input_dir: /path/to/lr_images
  output_dir: outputs/dualtsr_ctr_4x/infer
  steps: 4
  qualitative_steps: 160
  cfg_scale: 1.0
  text_sampling: sample
  use_ema: true

evaluation:
  predictions: outputs/dualtsr_ctr_4x/infer/predictions.jsonl
  ground_truth: /path/to/ground_truth.jsonl
  transocr_checkpoint: /path/to/transocr/checkpoint
  # JSONL/CSV generated by running the fixed TransOCR evaluator over SR images.
  # Each row must contain id and text.
  ocr_predictions: /path/to/transocr_predictions.jsonl

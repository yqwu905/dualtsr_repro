output_dir: outputs/dualtsr_ctr_4x

runtime:
  device: auto
  precision: bf16
  seed: 1234

prepare:
  source_lmdb: /path/to/ctr/scene/train_lmdb
  output_dir: data/ctr_tsr
  vocab_path: data/ctr_tsr/vocab.txt
  export_images: false

data:
  type: ctr_lmdb
  scale: 4
  hr_size: [128, 512]
  max_text_length: 24
  min_long_side: 64
  min_aspect_ratio: 2.0
  scan_images: true
  degradation:
    random_order: true
    blur_prob: 0.8
    blur_min: 0.1
    blur_max: 2.0
    noise_prob: 0.6
    noise_min: 0.0
    noise_max: 8.0
    jpeg_prob: 0.7
    jpeg_min: 35
    jpeg_max: 95
  train:
    type: ctr_lmdb
    lmdb_path: /path/to/ctr/scene/train_lmdb
    online_degradation: true
  val:
    type: ctr_lmdb
    lmdb_path: /path/to/ctr/scene/test_lmdb
    online_degradation: true

tokenizer:
  vocab_path: data/ctr_tsr/vocab.txt
  pad_token: <pad>
  mask_token: <mask>
  unk_token: <unk>

vae:
  type: autoencoder_kl
  pretrained_path: /path/to/pretrained/vae
  latent_size: [16, 64]
  scaling_factor: 0.18215

model:
  patch_size: [2, 2]
  hidden_dim: 768
  depth: 12
  num_heads: 12
  mlp_ratio: 4.0
  dropout: 0.0

loader:
  batch_size: 8
  num_workers: 8
  pin_memory: true
  drop_last: true
  persistent_workers: true

optimizer:
  lr: 0.0001
  weight_decay: 0.05
  betas: [0.9, 0.95]

train:
  max_steps: 700000
  global_batch_size: 32
  warmup_steps: 10000
  min_lr_ratio: 0.0
  text_timesteps: 8
  text_delta: 0.0001
  text_loss_weight_by_time: true
  guidance_scale: 1.0
  cfg_dropout: 0.1
  ema_decay: 0.9999
  grad_clip_norm: 1.0
  loss_img_weight: 1.0
  loss_txt_weight: 1.0
  loss_joint_weight: 1.0
  resume: null

checkpoint:
  save_every: 5000

logging:
  scalar_every: 10
  image_every: 1000
  max_images: 4

infer:
  checkpoint: outputs/dualtsr_ctr_4x/checkpoints/latest.pt
  input_dir: /path/to/lr_images
  output_dir: outputs/dualtsr_ctr_4x/infer
  steps: 4
  qualitative_steps: 160
  cfg_scale: 1.0
  text_sampling: sample
  use_ema: true

evaluation:
  predictions: outputs/dualtsr_ctr_4x/infer/predictions.jsonl
  ground_truth: /path/to/ground_truth.jsonl
  transocr_checkpoint: /path/to/transocr/checkpoint


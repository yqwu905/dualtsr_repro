# E-MMDiT training entry for JSON manifests with rows:
#   [{"hr": "image_0001.png", "prompt": "文字label"}, ...]
#
# Set `data.root` to the image root directory. Relative `hr` filenames are
# resolved under that root. LQ inputs are generated by online degradation.

output_dir: outputs/hr_prompt_json_emmdit

runtime:
  device: auto
  precision: bf16
  seed: 1234
  ddp_find_unused_parameters: true

data:
  type: manifest
  root: /path/to/image_root
  manifest_path: /path/to/labels.json
  scale: 4
  hr_size: [128, 512]
  max_text_length: 24
  text_sequence_length: 25
  degradation:
    strategies:
      - name: bsrgan_random_order
        probability: 0.5
        random_order: true
        blur_prob: 0.8
        blur_min: 0.1
        blur_max: 2.0
        noise_prob: 0.6
        noise_min: 0.0
        noise_max: 8.0
        jpeg_prob: 0.7
        jpeg_min: 35
        jpeg_max: 95
      - name: realesrgan_ordered
        probability: 0.5
        random_order: false
        blur_prob: 0.9
        blur_min: 0.1
        blur_max: 2.5
        noise_prob: 0.7
        noise_min: 0.0
        noise_max: 10.0
        jpeg_prob: 0.8
        jpeg_min: 30
        jpeg_max: 95
  train:
    type: manifest
    manifest_path: /path/to/train_labels.json
    root: /path/to/image_root
    online_degradation: true
  val:
    type: manifest
    manifest_path: /path/to/val_labels.json
    root: /path/to/image_root
    online_degradation: true
    deterministic_degradation: true

tokenizer:
  class_path: dualtsr.tokenizer:CharTokenizer
  vocab_path: data/hr_prompt_json/vocab.txt
  pad_token: <pad>
  mask_token: <mask>
  unk_token: <unk>
  eos_token: <eos>

vae:
  type: autoencoder_dc
  pretrained_path: weights/dc-ae-f32c32-sana-1.0-diffusers
  latent_channels: 32
  latent_size: [4, 16]
  scaling_factor: 0.41407

model:
  hidden_dim: 384
  text_encoder:
    type: char
  mmdit:
    class_path: dualtsr.emmdit:EMMDiTBackbone
    init_args:
      patch_size: 1
      num_heads: 12
      group_depths: [2, 6, 2]
      mlp_ratio: 3.0
      dropout: 0.0
      use_subregion_attention: true
      gradient_checkpointing: true

loader:
  batch_size: 64
  num_workers: 8
  pin_memory: true
  drop_last: true
  persistent_workers: true

optimizer:
  lr: 0.0002
  weight_decay: 0.05
  betas: [0.9, 0.95]

train:
  max_steps: 100000
  global_batch_size: 128
  warmup_steps: 1000
  min_lr_ratio: 0.0
  text_timesteps: 4
  text_delta: 0.0001
  text_loss_weight_by_time: true
  guidance_scale: 1.0
  cfg_dropout: 0.1
  ema_decay: 0.9999
  grad_clip_norm: 1.0
  loss_img_weight: 1.0
  loss_txt_weight: 1.0
  loss_joint_weight: 1.0
  resume: null

checkpoint:
  save_every: 1000

logging:
  scalar_every: 10
  image_every: 500
  max_images: 4
